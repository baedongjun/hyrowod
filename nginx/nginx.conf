user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ──────────────────────────────────────────
    # HTTP → HTTPS 리다이렉트
    # ──────────────────────────────────────────
    server {
        listen 80;
        server_name crossfitkorea.com www.crossfitkorea.com
                    crossfitkorea.co.kr www.crossfitkorea.co.kr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://crossfitkorea.com$request_uri;
        }
    }

    # ──────────────────────────────────────────
    # HTTPS 메인 서버
    # ──────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name crossfitkorea.com www.crossfitkorea.com
                    crossfitkorea.co.kr www.crossfitkorea.co.kr;

        ssl_certificate     /etc/letsencrypt/live/crossfitkorea.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/crossfitkorea.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options       DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection      "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Spring Boot API ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── OAuth2 인증 시작 (카카오/구글 간편로그인) ──
        # /oauth2/callback, /oauth2/register 는 Next.js 페이지이므로 제외
        location /oauth2/authorization/ {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /login/oauth2/ {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # 인증 API 더 엄격한 rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Swagger (프로덕션 비활성화 시 이 블록 주석 처리) ──
        location /swagger-ui/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
        }
        location /v3/api-docs {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
        }

        # ── Actuator health (외부 접근 허용) ──
        location /actuator/health {
            proxy_pass http://backend:8080;
        }

        # ── Next.js 정적 파일 캐싱 ──
        location /_next/static/ {
            proxy_pass http://frontend:3000;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js 앱 ──
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
