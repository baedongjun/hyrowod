<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CFK App Icon Generator</title>
</head>
<body style="background:#333; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; font-family:sans-serif;">

  <canvas id="icon" width="128" height="128" style="border:1px solid #555;"></canvas>

  <button onclick="download()" style="padding:12px 32px; background:#e8220a; color:#fff; border:none; font-size:16px; font-weight:bold; cursor:pointer;">
    PNG 다운로드 (128x128)
  </button>

  <script>
    const canvas = document.getElementById('icon');
    const ctx = canvas.getContext('2d');

    // 배경
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 128, 128);

    // 포인트 삼각형 장식
    ctx.fillStyle = 'rgba(232,34,10,0.2)';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(45,0); ctx.lineTo(0,45); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(128,128); ctx.lineTo(83,128); ctx.lineTo(128,83); ctx.closePath(); ctx.fill();

    // 바벨 바
    ctx.fillStyle = '#e8220a';
    ctx.fillRect(22, 60, 84, 7);

    // 왼쪽 플레이트 큰
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(16, 43, 10, 41);
    // 왼쪽 플레이트 작은
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(8, 50, 8, 27);

    // 오른쪽 플레이트 큰
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(102, 43, 10, 41);
    // 오른쪽 플레이트 작은
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(120, 50, 8, 27);

    // CFK 상단 텍스트
    ctx.fillStyle = '#f5f0e8';
    ctx.font = 'bold 20px Arial Black, sans-serif';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '2px';
    ctx.fillText('CFK', 64, 34);

    // CROSSFIT 하단
    ctx.fillStyle = '#f5f0e8';
    ctx.font = 'bold 11px Arial, sans-serif';
    ctx.fillText('CROSSFIT', 64, 104);

    // KOREA 하단 레드
    ctx.fillStyle = '#e8220a';
    ctx.font = 'bold 11px Arial, sans-serif';
    ctx.fillText('KOREA', 64, 119);

    function download() {
      const link = document.createElement('a');
      link.download = 'cfkorea-app-icon.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
