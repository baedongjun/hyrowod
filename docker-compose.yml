version: '3.8'

services:
  app:
    build: .
    container_name: crossfitkorea-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=crossfitkorea
      - DB_USERNAME=crossfitkorea
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms128m -Xmx384m -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crossfitkorea-net
    restart: on-failure
    mem_limit: 600m
    memswap_limit: 600m

  postgres:
    image: postgres:16-alpine
    container_name: crossfitkorea-postgres
    environment:
      POSTGRES_DB: crossfitkorea
      POSTGRES_USER: crossfitkorea
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossfitkorea"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crossfitkorea-net

  redis:
    image: redis:7-alpine
    container_name: crossfitkorea-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crossfitkorea-net

volumes:
  postgres-data:
  redis-data:

networks:
  crossfitkorea-net:
    driver: bridge