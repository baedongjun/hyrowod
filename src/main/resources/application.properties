spring.application.name=crossfitkorea

# ============================================================
# Server
# ============================================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ============================================================
# Database (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crossfitkorea}
spring.datasource.username=${DB_USERNAME:crossfitkorea}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Redis
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:crossfitkorea-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================
# AWS S3
# ============================================================
aws.s3.bucket=${AWS_S3_BUCKET:crossfitkorea-bucket}
aws.s3.region=${AWS_REGION:ap-northeast-2}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# ============================================================
# Kakao Map
# ============================================================
kakao.rest-api-key=${KAKAO_REST_API_KEY:}

# ============================================================
# Toss Payments
# ============================================================
toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:}
toss.payments.client-key=${TOSS_PAYMENTS_CLIENT_KEY:}

# ============================================================
# Swagger / SpringDoc
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# ============================================================
# Logging
# ============================================================
logging.level.com.crossfitkorea=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN