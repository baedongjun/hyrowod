# ============================================================
# Test Configuration
# ============================================================

spring.application.name=crossfitkorea-test

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT
jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# AWS S3 (test values)
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.s3.bucket=test-bucket
aws.s3.region=ap-northeast-2

# Mail (disabled in tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# App
app.frontend-url=http://localhost:3000

# Kakao
kakao.rest-api-key=test-kakao-key

# OAuth2 (test dummy values)
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

# Toss Payments
toss.payments.secret-key=test-toss-secret-key
toss.payments.client-key=test-toss-client-key

# Swagger (disable in tests)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging (quiet in tests)
logging.level.com.crossfitkorea=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
