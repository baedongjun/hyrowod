# ============================================================
# Test Configuration
# ============================================================

spring.application.name=crossfitkorea-test

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT
jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# AWS S3 (test values)
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.s3.bucket=test-bucket
aws.s3.region=ap-northeast-2

# Kakao
kakao.rest-api-key=test-kakao-key

# Toss Payments
toss.payments.secret-key=test-toss-secret-key
toss.payments.client-key=test-toss-client-key

# Swagger (disable in tests)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging (quiet in tests)
logging.level.com.crossfitkorea=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
