version: '3.8'

services:
  # ──────────────────────────────────────────
  # Nginx (리버스 프록시 + SSL)
  # ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crossfitkorea-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - crossfitkorea-net
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Redis (로컬 캐시)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crossfitkorea-redis
    networks:
      - crossfitkorea-net
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  # ──────────────────────────────────────────
  # Spring Boot 백엔드 (ECR 이미지)
  # ──────────────────────────────────────────
  backend:
    image: ${ECR_REGISTRY}/crossfitkorea-backend:${IMAGE_TAG:-latest}
    container_name: crossfitkorea-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: ${BASE_URL:-https://crossfitkorea.com}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY}
      JAVA_OPTS: -Xms128m -Xmx384m -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    mem_limit: 600m
    memswap_limit: 600m
    depends_on:
      - redis
    networks:
      - crossfitkorea-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────
  # Next.js 프론트엔드 (ECR 이미지)
  # ──────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/crossfitkorea-frontend:${IMAGE_TAG:-latest}
    container_name: crossfitkorea-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://crossfitkorea.com
      NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crossfitkorea-net
    restart: unless-stopped

volumes:
  nginx-logs:

networks:
  crossfitkorea-net:
    driver: bridge
